name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      # Node.js 24対応の最新バージョン(v4)に更新
      - uses: actions/checkout@v4

      # Node.js 24対応の最新バージョン(v4)に更新
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x" # ビルド環境もモダンなバージョンに更新

      - name: Build plugin
        run: |
          npm install
          # もしビルドコマンドがない場合は npm run build の代わりに直接ファイルを準備する処理を記述
          # 今回の main.js 直接配布スタイルならこのステップは調整可能です

      # 🌟 Artifact Attestations (ビルド証明) を生成
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'main.js'

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          gh release create "$tag" \
            --title="$tag" \
            --generate-notes \
            main.js manifest.json styles.css